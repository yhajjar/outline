services:
  outline:
    build: .
    ports:
      - "127.0.0.1:3040:3040"
    env_file: .env
    depends_on:
      - postgres
      - redis
  redis:
    image: redis
    ports:
      - "127.0.0.1:6380:6379"
    user: "redis:redis"
  postgres:
    image: postgres
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: outline
    user: "postgres:postgres"
